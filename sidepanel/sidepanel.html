<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTTP Link Scanner</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-main">
        <h1>HTTP Link Scanner</h1>
        <button id="settings-toggle" class="icon-btn" title="설정">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12,15.5A3.5,3.5 0 0,1 8.5,12A3.5,3.5 0 0,1 12,8.5A3.5,3.5 0 0,1 15.5,12A3.5,3.5 0 0,1 12,15.5M19.43,12.97C19.47,12.65 19.5,12.33 19.5,12C19.5,11.67 19.47,11.35 19.43,11.03L21.54,9.37C21.73,9.22 21.78,8.95 21.66,8.73L19.66,5.27C19.54,5.05 19.27,4.97 19.05,5.05L16.56,6.05C16.04,5.65 15.47,5.32 14.87,5.07L14.49,2.42C14.46,2.18 14.25,2 14,2H10C9.75,2 9.54,2.18 9.51,2.42L9.13,5.07C8.53,5.32 7.96,5.65 7.44,6.05L4.95,5.05C4.73,4.97 4.46,5.05 4.34,5.27L2.34,8.73C2.22,8.95 2.27,9.22 2.46,9.37L4.57,11.03C4.53,11.35 4.5,11.67 4.5,12C4.5,12.33 4.53,12.65 4.57,12.97L2.46,14.63C2.27,14.78 2.22,15.05 2.34,15.27L4.34,18.73C4.46,18.95 4.73,19.03 4.95,18.95L7.44,17.95C7.96,18.35 8.53,18.68 9.13,18.93L9.51,21.58C9.54,21.82 9.75,22 10,22H14C14.25,22 14.46,21.82 14.49,21.58L14.87,18.93C15.47,18.68 16.04,18.35 16.56,17.95L19.05,18.95C19.27,19.03 19.54,18.95 19.66,18.73L21.66,15.27C21.78,15.05 21.73,14.78 21.54,14.63L19.43,12.97Z" /></svg>
        </button>
      </div>
      <p class="subtitle">비정상/비보안 링크 실시간 탐지</p>
    </header>

    <div id="settings-panel" class="settings-panel hidden">
      <div class="setting-item">
        <label for="auto-scan">페이지 로드시 자동 스캔</label>
        <label class="switch">
          <input type="checkbox" id="auto-scan">
          <span class="slider round"></span>
        </label>
      </div>
    </div>

    <div class="actions">
      <button id="scan-btn" class="primary-btn">페이지 스캔 시작</button>
    </div>

    <div id="stats" class="stats-container hidden">
      <div class="stat-item">
        <span class="stat-label">발견된 링크:</span>
        <span id="link-count" class="stat-value">0</span>
      </div>
    </div>

    <div id="results-container" class="results-container">
      <div id="loading-state" class="loading-state hidden">
        <div class="spinner"></div>
        <p>페이지 스캔 중...</p>
      </div>
      <div id="empty-state" class="empty-state">
        <p>스캔 버튼을 눌러 http:// 링크를 찾아보세요.</p>
      </div>
      <ul id="link-list" class="link-list"></ul>
    </div>
  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
